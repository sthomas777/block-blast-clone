name: Backend CI

on:
  push:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

jobs:
  lint-and-type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd backend && uv sync
      - run: cd backend && uv run ruff check
      - run: cd backend && uv run ruff format --check
      - run: cd backend && uv run pyrefly check

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd backend && uv sync
      - run: cd backend && uv run pytest -m "not integration" --cov=src --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend

  integration-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: ${{ secrets.DB_NAME }}
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd backend && uv sync
      - run: cd backend && uv run pytest -m "integration" --cov=src --cov-report=xml
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - uses: codecov/codecov-action@v4
        with:
          files: ./backend/coverage.xml
          flags: backend-integration
