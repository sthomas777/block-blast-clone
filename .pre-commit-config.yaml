repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: debug-statements
      - id: requirements-txt-fixer
  - repo: local
    hooks:
      - id: uv-lock
        name: uv-lock
        entry: bash -c 'cd backend && uv lock --check'
        language: system
        files: ^backend/(pyproject\.toml|uv\.lock)$
        pass_filenames: false
  - repo: https://github.com/asottile/add-trailing-comma
    rev: v4.0.0
    hooks:
      - id: add-trailing-comma
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.14
    hooks:
      - id: ruff-check
      - id: ruff-format
  - repo: local
    hooks:
      - id: pyrefly-check
        name: Pyrefly (type checking)
        entry: bash -c 'cd backend && uv run pyrefly check'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx prettier . --write
        language: node
        additional_dependencies: ["prettier@latest"]
